<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --forest: #1e4a2e;
    --sage: #4a7c5e;
    --mint: #8fbea0;
    --foam: #d6ede0;
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
  }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
  }

  .blob-1 {
    width: 500px; height: 500px;
    background: var(--foam);
    top: -120px; right: -80px;
    opacity: 0.5;
    animation: drift1 14s ease-in-out infinite alternate;
  }

  .blob-2 {
    width: 380px; height: 380px;
    background: var(--mint);
    bottom: -80px; left: -60px;
    opacity: 0.2;
    animation: drift2 18s ease-in-out infinite alternate;
  }

  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(30px, 24px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-20px, -28px); } }

  /* content */
  .content {
    text-align: center;
    padding: 40px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeIn 1s ease 0.8s forwards;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--forest);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-icon svg { width: 20px; height: 20px; fill: white; }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--forest);
    letter-spacing: -0.02em;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5.5vw, 5rem);
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: -0.03em;
    color: var(--forest);
    max-width: 820px;
  }

  h1 .line-1 {
    display: block;
    opacity: 0;
    animation: fadeIn 0.9s ease 1.0s forwards;
  }

  h1 .line-2 {
    display: block;
    font-style: italic;
    color: var(--sage);
    opacity: 0;
    animation: fadeIn 0.9s ease 1.3s forwards;
  }

  h1 .line-3 {
    display: block;
    opacity: 0;
    animation: fadeIn 0.9s ease 1.6s forwards;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, var(--sage), var(--mint));
    border-radius: 100px;
    margin: 36px auto;
    opacity: 0;
    animation: fadeIn 0.8s ease 2.1s forwards;
  }

  .sub {
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    color: #6b7b6e;
    font-weight: 300;
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeIn 0.8s ease 2.3s forwards;
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="content">
  <h1>
    <span class="line-1">This could be real,</span>
    <span class="line-2">we could make a change,</span>
    <span class="line-3">but we need your support<br>to make it happen.</span>
  </h1>

</body>
</html>
